<body>
    <nav class="navbar navbar-expand-md navbar-dark bg-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="#">College Event Management</a>
            <button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#myMenu">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="myMenu">
                <ul class="navbar-nav nav-tabs p-2 m-3"style="text-decoration:none;">
                    <li class="nav-item" active>
                        <a href="Home.html" class="nav-link"><i class="bi bi-house"></i>Home</a>
                    </li>
                    <li class="nav-item">
                        <div class="dropdown">
                            <button class="btn dropdown-toggle text-light" data-bs-toggle="dropdown"><i class="bi bi-calendar-event"></i>Events</button>
                            <ul class="dropdown-menu">
                                <li><a class="bg-dark dropdown-item nav-link" href="events.html"><i class="bi-calendar-event-fill"></i>Event Details</a></li>
                                <li><a class="bg-secondary dropdown-item nav-link" href="schedule.html"><i class="bi bi-calendar"></i>Event Schedule</a></li>
                            </ul>
                        </div>
                    </li>
                    <li class="nav-item">
                        <a href="gallery.html" class="nav-link"><i class="bi bi-images"></i>Gallery</a>
                    </li>
                    <li class="nav-item">
                        <a href="registration.html" class="nav-link"><i class="bi bi-person-plus-fill"></i>Registration</a>
                    </li>

                    </li>

        </div>
    </nav>
    <section>
        <div class="display-1 text-center">Event Registration</div>
        <div class="container border border-5 border-dark my-3" style="background:linear-gradient(rgb(172, 223, 223),rgba(62, 138, 189, 0.938))">
            <div style="text-decoration: underline;text-align: center;font-size: 50px;">Registration</div>
            <form action="#" method="post" onsubmit="alert('You are successfully registered for the event')">
                <label for="Name">Name</label>
                <input class="form-control" id="Name" name="name" type="text" placeholder="FullName">
                <label for="roll">Roll Number</label>
                <input class="form-control" id="roll" name="roll" type="text" placeholder="Roll Number">
                <label for="branch">Branch</label>
                <select id="branch" name="branch" class="form-select">
                    <option>Computer Science Engineering</option>
                    <option>Information Technology</option>
                    <option>Electronics and Communication Engineering</option>
                    <option>Electrical Engineering</option>
                    <option>Mechanical Engineering</option>
                    <option>Civil Engineering</option>
                    <option>Chemical Engineering</option>
                    <option>Aeronautical / Aerospace Engineering</option>
                    <option>Biotechnology / Biomedical Engineering</option>
                </select>
                <label for="mail">Email</label>
                <input class="form-control" id="mail" name="mail" type="email" placeholder="Email">
                <label for="ph">Phone Number</label>
                <input class="form-control" id="ph" name="ph" type="tel" placeholder="PhoneNumber">
                <label for="event">Event</label>
                <select id="event" name="event" class="form-select">
                    <option>Technical Quiz</option>
                    <option>Hackathon</option>
                    <option>Poster Presentation</option>
                    <option>Coding Contest</option>
                    <option>Project Expo</option>
                    <option>Cultural Fest</option>
                </select>
                <div class="fw-bold h-6 mt-2">
                    <div class="form-check">
                        <input class="form-check-input"
                        type="checkbox">
                        <label class="form-check-label">Terms and Conditions</label>
                    </div>
                </div>
                <div class="text-center">
                    <button type="submit" class="btn btn-primary m-3 justify-content-center">Submit</submit>
                </div>
            </form>
        </div>
    </section>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
